<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoisyNeighbors</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        .header {
            background: #16213e;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #0f3460;
        }
        .header h1 { font-size: 24px; }
        .header .subtitle { color: #888; font-size: 14px; margin-top: 4px; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 16px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* Status */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        .status-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4ecca3;
            animation: pulse 2s infinite;
        }
        .status-dot.boom { background: #e23e57; animation: none; }
        .status-dot.cooldown { background: #f0a500; animation: none; }
        .status-dot.disabled { background: #666; animation: none; }
        .toggle-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle-btn.on { background: #4ecca3; color: #1a1a2e; }
        .toggle-btn.off { background: #666; color: #eee; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .boom-count {
            font-size: 48px;
            font-weight: bold;
            color: #e23e57;
        }
        .boom-count-label { color: #888; font-size: 14px; }

        /* VU Meter */
        .vu-container {
            height: 32px;
            background: #0f3460;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        .vu-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4ecca3, #f0a500, #e23e57);
            transition: width 0.1s;
            border-radius: 6px;
        }
        .vu-threshold {
            position: absolute;
            top: 0;
            height: 100%;
            width: 2px;
            background: #fff;
            opacity: 0.6;
        }
        .vu-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font-size: 12px;
            color: #666;
        }

        /* Sliders */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }
        .slider-row label {
            font-size: 13px;
            color: #888;
            min-width: 80px;
        }
        .slider-row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 8px;
            border-radius: 4px;
            background: #0f3460;
            outline: none;
        }
        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4ecca3;
            cursor: pointer;
        }
        .slider-value {
            min-width: 40px;
            text-align: right;
            font-weight: bold;
            font-size: 14px;
        }

        /* Volume */
        .volume-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 8px;
            border-radius: 4px;
            background: #0f3460;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4ecca3;
            cursor: pointer;
        }
        .volume-value {
            min-width: 40px;
            text-align: right;
            font-weight: bold;
        }

        /* History */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 14px;
        }
        .history-item:last-child { border-bottom: none; }
        .history-time { color: #888; }
        .history-rms { color: #e23e57; font-weight: bold; }
        .history-empty { color: #666; text-align: center; padding: 20px; }

        /* Sound select */
        .sound-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: 16px;
        }

        /* Buttons */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-reset {
            background: #0f3460;
            color: #888;
            margin-top: 12px;
        }
        .btn-reset:hover { background: #1a4a8a; color: #eee; }
        .save-feedback {
            display: inline-block;
            margin-left: 12px;
            color: #4ecca3;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        @media (max-width: 600px) {
            .status-row { flex-direction: column; gap: 16px; text-align: center; }
            .slider-row label { min-width: 60px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>NoisyNeighbors</h1>
        <div class="subtitle">Noise Detection & Replay System</div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Status</h2>
            <div class="status-row">
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Listening...</span>
                </div>
                <button class="toggle-btn on" id="toggleBtn" onclick="toggleEnabled()">Disable</button>
                <div style="text-align: center;">
                    <div class="boom-count" id="boomCount">0</div>
                    <div class="boom-count-label">booms today</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Detection Level</h2>
            <div class="vu-container">
                <div class="vu-bar" id="vuBar"></div>
                <div class="vu-threshold" id="vuThreshold"></div>
            </div>
            <div class="vu-labels">
                <span>0</span>
                <span id="rmsValue">0.0000</span>
                <span>1.0</span>
            </div>
            <div class="slider-row">
                <label>Threshold</label>
                <input type="range" id="threshold" min="0.01" max="1" step="0.01" value="0.15">
                <span class="slider-value" id="thresholdValue">0.15</span>
            </div>
        </div>

        <div class="card">
            <h2>Devices</h2>
            <div style="margin-bottom: 10px;">
                <label style="font-size: 12px; color: #888; display: block; margin-bottom: 4px;">Input (mic)</label>
                <select class="sound-select" id="inputDevice" onchange="setInputDevice(this.value)">
                    <option value="">Detecting...</option>
                </select>
            </div>
            <div style="margin-bottom: 12px;">
                <label style="font-size: 12px; color: #888; display: block; margin-bottom: 4px;">Output (speaker)</label>
                <select class="sound-select" id="alsaDevice" onchange="setAlsaDevice(this.value)">
                    <option value="">Detecting...</option>
                </select>
            </div>
            <div class="volume-row">
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="11" step="1" value="11">
                <span class="volume-value" id="volumeValue">11</span>
            </div>
        </div>

        <div class="card">
            <h2>Response Sound</h2>
            <select class="sound-select" id="replayMode" onchange="setReplayMode(this.value)">
                <option value="echo">Echo (replay the boom)</option>
            </select>
        </div>

        <div class="card">
            <h2>History</h2>
            <div class="history-list" id="historyList">
                <div class="history-empty">No detections yet</div>
            </div>
        </div>

        <div class="card">
            <h2>Settings</h2>
            <div class="slider-row">
                <label>Cooldown</label>
                <input type="range" id="cooldown_seconds" min="0" max="30" step="1" value="5">
                <span class="slider-value" id="cooldownValue">5s</span>
            </div>
            <div class="slider-row">
                <label>Pre-boom</label>
                <input type="range" id="pre_boom_seconds" min="0.1" max="5" step="0.1" value="1.0">
                <span class="slider-value" id="preBoomValue">1.0s</span>
            </div>
            <div class="slider-row">
                <label>Post-boom</label>
                <input type="range" id="post_boom_seconds" min="0.1" max="5" step="0.1" value="1.5">
                <span class="slider-value" id="postBoomValue">1.5s</span>
            </div>
            <button class="btn btn-reset" onclick="resetDefaults()">Reset Defaults</button>
            <span class="save-feedback" id="saveFeedback">Saved!</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        let threshold = 0.15;

        function updateThresholdLine() {
            document.getElementById('vuThreshold').style.left = (threshold * 100) + '%';
        }

        function showSaved() {
            var fb = document.getElementById('saveFeedback');
            fb.style.opacity = 1;
            setTimeout(function() { fb.style.opacity = 0; }, 1500);
        }

        function saveSettings() {
            var t = parseFloat(document.getElementById('threshold').value);
            var cd = parseInt(document.getElementById('cooldown_seconds').value);
            var pre = parseFloat(document.getElementById('pre_boom_seconds').value);
            var post = parseFloat(document.getElementById('post_boom_seconds').value);
            if (isNaN(t) || isNaN(cd) || isNaN(pre) || isNaN(post)) return;
            threshold = t;
            updateThresholdLine();
            socket.emit('save_config', {
                threshold: t,
                cooldown_seconds: cd,
                pre_boom_seconds: pre,
                post_boom_seconds: post,
            });
            showSaved();
        }

        // Threshold slider
        var thresholdSlider = document.getElementById('threshold');
        thresholdSlider.addEventListener('input', function() {
            threshold = parseFloat(this.value);
            document.getElementById('thresholdValue').textContent = threshold.toFixed(2);
            updateThresholdLine();
        });
        thresholdSlider.addEventListener('change', function() { saveSettings(); });

        // Cooldown slider
        var cooldownSlider = document.getElementById('cooldown_seconds');
        cooldownSlider.addEventListener('input', function() {
            document.getElementById('cooldownValue').textContent = this.value + 's';
        });
        cooldownSlider.addEventListener('change', function() { saveSettings(); });

        // Pre-boom slider
        var preBoomSlider = document.getElementById('pre_boom_seconds');
        preBoomSlider.addEventListener('input', function() {
            document.getElementById('preBoomValue').textContent = parseFloat(this.value).toFixed(1) + 's';
        });
        preBoomSlider.addEventListener('change', function() { saveSettings(); });

        // Post-boom slider
        var postBoomSlider = document.getElementById('post_boom_seconds');
        postBoomSlider.addEventListener('input', function() {
            document.getElementById('postBoomValue').textContent = parseFloat(this.value).toFixed(1) + 's';
        });
        postBoomSlider.addEventListener('change', function() { saveSettings(); });

        // Input device selector
        socket.on('input_devices', function(data) {
            var sel = document.getElementById('inputDevice');
            sel.innerHTML = '';
            data.devices.forEach(function(d) {
                var opt = document.createElement('option');
                opt.value = d.id;
                opt.textContent = d.name;
                if (d.id === data.current) opt.selected = true;
                sel.appendChild(opt);
            });
        });

        function setInputDevice(device) {
            socket.emit('set_input_device', { device: parseInt(device) });
        }

        // RMS level
        socket.on('rms', function(data) {
            var pct = Math.min(data.level * 100 / 0.5, 100);
            document.getElementById('vuBar').style.width = pct + '%';
            document.getElementById('rmsValue').textContent = data.level.toFixed(4);
        });

        // Status updates
        socket.on('status', function(data) {
            var dot = document.getElementById('statusDot');
            var text = document.getElementById('statusText');
            dot.className = 'status-dot';
            if (data.state === 'disabled') {
                dot.classList.add('disabled');
                text.textContent = 'Disabled';
            } else if (data.state === 'boom') {
                dot.classList.add('boom');
                text.textContent = 'BOOM detected!';
            } else if (data.state === 'cooldown') {
                dot.classList.add('cooldown');
                text.textContent = 'Cooldown...';
            } else {
                text.textContent = 'Listening...';
            }
        });

        // Toggle enable/disable
        socket.on('enabled_state', function(data) {
            var btn = document.getElementById('toggleBtn');
            if (data.enabled) {
                btn.className = 'toggle-btn on';
                btn.textContent = 'Disable';
            } else {
                btn.className = 'toggle-btn off';
                btn.textContent = 'Enable';
            }
        });

        function toggleEnabled() {
            socket.emit('toggle_enabled');
        }

        // Replay mode
        var soundLabels = {
            echo: 'Echo (replay the boom)',
            alarm: 'Alarm',
            doorbell: 'Doorbell',
            hammer: 'Hammer',
            honk: 'Honk',
            siren: 'Siren'
        };

        socket.on('replay_mode', function(data) {
            var sel = document.getElementById('replayMode');
            sel.innerHTML = '';
            data.available.forEach(function(s) {
                var opt = document.createElement('option');
                opt.value = s;
                opt.textContent = soundLabels[s] || s;
                if (s === data.mode) opt.selected = true;
                sel.appendChild(opt);
            });
        });

        function setReplayMode(mode) {
            socket.emit('set_replay_mode', { mode: mode });
        }

        // Boom detection event
        socket.on('boom', function(data) {
            document.getElementById('boomCount').textContent = data.today_count;
            var list = document.getElementById('historyList');
            var empty = list.querySelector('.history-empty');
            if (empty) empty.remove();
            var item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = '<span class="history-time">' + data.time + '</span>' +
                '<span>Duration: ' + data.duration.toFixed(1) + 's</span>' +
                '<span class="history-rms">RMS: ' + data.rms.toFixed(4) + '</span>';
            list.insertBefore(item, list.firstChild);
            while (list.children.length > 50) {
                list.removeChild(list.lastChild);
            }
        });

        // Load config
        socket.on('config', function(data) {
            threshold = data.threshold;
            document.getElementById('threshold').value = data.threshold;
            document.getElementById('thresholdValue').textContent = parseFloat(data.threshold).toFixed(2);
            document.getElementById('cooldown_seconds').value = data.cooldown_seconds;
            document.getElementById('cooldownValue').textContent = data.cooldown_seconds + 's';
            document.getElementById('pre_boom_seconds').value = data.pre_boom_seconds;
            document.getElementById('preBoomValue').textContent = parseFloat(data.pre_boom_seconds).toFixed(1) + 's';
            document.getElementById('post_boom_seconds').value = data.post_boom_seconds;
            document.getElementById('postBoomValue').textContent = parseFloat(data.post_boom_seconds).toFixed(1) + 's';
            updateThresholdLine();
        });

        // Load history
        socket.on('history', function(data) {
            var list = document.getElementById('historyList');
            if (data.items.length === 0) return;
            list.innerHTML = '';
            document.getElementById('boomCount').textContent = data.today_count;
            data.items.forEach(function(item) {
                var el = document.createElement('div');
                el.className = 'history-item';
                el.innerHTML = '<span class="history-time">' + item.time + '</span>' +
                    '<span>Duration: ' + item.duration.toFixed(1) + 's</span>' +
                    '<span class="history-rms">RMS: ' + item.rms.toFixed(4) + '</span>';
                list.appendChild(el);
            });
        });

        function resetDefaults() {
            document.getElementById('threshold').value = 0.15;
            document.getElementById('thresholdValue').textContent = '0.15';
            document.getElementById('cooldown_seconds').value = 5;
            document.getElementById('cooldownValue').textContent = '5s';
            document.getElementById('pre_boom_seconds').value = 1.0;
            document.getElementById('preBoomValue').textContent = '1.0s';
            document.getElementById('post_boom_seconds').value = 1.5;
            document.getElementById('postBoomValue').textContent = '1.5s';
            threshold = 0.15;
            updateThresholdLine();
            saveSettings();
        }

        // ALSA device selector
        socket.on('alsa_devices', function(data) {
            var sel = document.getElementById('alsaDevice');
            sel.innerHTML = '';
            data.devices.forEach(function(d) {
                var opt = document.createElement('option');
                opt.value = d.id;
                opt.textContent = d.name + ' (' + d.id + ')';
                if (d.id === data.current) opt.selected = true;
                sel.appendChild(opt);
            });
        });

        function setAlsaDevice(device) {
            socket.emit('set_alsa_device', { device: device });
        }

        // Volume slider
        var volumeSlider = document.getElementById('volumeSlider');
        var volumeValue = document.getElementById('volumeValue');
        volumeSlider.addEventListener('input', function() {
            volumeValue.textContent = this.value;
            socket.emit('set_volume', { level: parseInt(this.value) });
        });

        socket.on('volume', function(data) {
            volumeSlider.value = data.level;
            volumeSlider.max = data.max;
            volumeValue.textContent = data.level;
        });

        updateThresholdLine();
    </script>
</body>
</html>
